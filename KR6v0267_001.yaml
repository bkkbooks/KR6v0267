body:
  text: 碑陽額大齊趙郡王之碑本文蓋聞珠林琁室現崑崙之中銀闕金宮跱蓬萊之上居之幽登之乃靈逐雨隨風懸殊六通之果黃衣丹椹亦非四類之味況陽止之洞省大帝之生半天之山七盧入香煙之嶽伏膺道術始學牛毛於我法門事均驢乳次復月光童子戲天台之傍仁祠浮圖繞嵩高之側行藏比於幻化出沒放於淨土弗罕逢濡足及於金臺羅漢遠住東海瓊樹聲聞遙家西域承風問道此實闕如豈若太玄所都化作經行之境真人所府翻成息心之地黃河之北忽出育王之龕蔥之東別有迦維之國然燈避風之處服藥息務之所和合戾止有朱山焉其地則上應琁星下分全趙邑迹靈丘念黑貂之為珥峰連牛飲吐白陸之滋川重嶺概雲苙人或凡曲澗無底瞻天謂窗晨光東壑類湯谷密邇暮色西巘怪崦嵫咫尺陰冰夏素想逼燭龍陽木冬青意近火鼠重巖之面有瀑布焉至於春泉初涌秋水時至蕭條圓注擬虹氛而上升散亂高流狀天河之懸瀉若乃金花瓊實映日香風玉酒石膏除飢卻老羊腸九坂蛇盤九曲驅龍從虎一見而不歸控鵠乘鸞暫遊而忘返定州定國寺禪師僧標身重戒珠心倫堅石時和人俗不染世塵以其山處間虛林幽爽曠香珍叶住地之德清靜賞仁人之心乃施淨財云為禪室於茲草有餘年矣背兔頭之嶺構柏堂之谷別房覓崎嶇之岫離館逐低昂之嶮交藤代幄懸葛當帷鑿石開塗披榛置徑因山結宇無勞一匱之勤即水縈池非求百姓之力霧集勤定之侶雲歸無漏之人正念不虧息心相繼頭堪孕鳥心成竹蛇採椽茅屋藜羹粟飯七益不受三淨不食是真苦行是實頭陀鐘韻應霜梵聲傳谷虎音才振風神散非時之花魚鱗已舉雨伯造清涼之氣百鳥競鳴學黑蜂之唱無我萬籟爭響寫天樂之娛法王聞和雅音咸無生忍屬大齊之馭九有纍聖重規羲軒之流炎昊之輩出東震握北斗擊玉鼓轉金輪前疑後承左賢右戚數當於天運名上於河圖入作股肱出為蕃屏使持節都督定幽安平東燕滄瀛諸軍事撫軍將軍儀同三司定州刺史六州大都督趙郡王高睿枝流薑水氣別大風昔殷周以稷契立功虞漢藉軒唐之德復有總農皇之緒兼尚父之勳光奄宇宙義高前篆祖同王季彰積德之符考即劉文協內謀之議休徵遠降爰誕異人封自東門土分北社多能將聖上稟天知幼秉蛇珠雀臺擒成麟角虎殿論儒辨樂三雍富河澗之典驂駕四馬高柏梁之勾吐握思賢安勞郭隗之策水鏡知士何有鄒陽之書故令司馬願遊解武騎邯鄲對見雅伏天人忠以奉公惠以施神敬鬼織天成地心將冥會非復爻象攸知迹出人表亦豈名言所測劉蒼德茂彌事謙下馬孚尊寵不以為榮至夫恆嶺崇高虞巡北嶽中山舊國漢號東蕃帝摯唐侯昔封此邑魏文太子復鎮斯城五陘傍通四關斜指荊卿易水含燕寒而北流王霸呼沱浮漢冰而南脈地中天府聞蘇子之言境實神州具盧之説海城七十僅譬閭井雲夢八九寧方藪澤連甍接棟煦氣成虹袨服靚莊揮汗如雨先公佐世嘗歷斯蕃皇弟分陝每為是牧帝室維翰莫此之尤劇齊中之河內之擇士遂乃褰襜明視戴冕來遊繡轂朱輪聯清塵於往迹鳴金繁唱接高風之遺響前後韋氏大小馮君挍德談榮飛天伏地屈其大道烹乎小鮮張瑟調琴裁縠製錦賤分陰於尺璧子黎庶而蒲蘆始布六條尋能一䛀移風化俗詎待七年去煞勝殘何求百歲政明民訟蚩郭賀之荊州甄屈搜賢鄙山濤之冀部百城順軌四時感德陰陽隨意綱目如旨寧復二縣不雨方待車行三郡無堪更令徵黜德既行焉功亦成焉田有遺糧果無外援蹍虺蛇而尾虎豹窺烏鵲而養鳳凰車迄今初歷七祀自人皇出谷分長九州秉旄作牧蓋無常限然梁習臨并止餘十載神皓處益唯乞一年恐須正階台載馳綸綍借君請帝向天門而難止臥道興望雲車而無極四民所以相告萬里所以先憂尋夫羊公刺連率梁楚宗令周邵親賢並播椒蘭俱懸日月未嘗矜萬物觀一己脆同蘆葦空似芭蕉縱四毒之任五情之馬與夫解所未解度所未度安可以相論哉我王夙殖善根剎利種以為靈光之殿遠謝微妙之臺黼黻之衣誠乖精進之鎧故以先覺而寤後覺後燈而助先燈將欲遠持三界盡置十善何直經緯文武粉澤禮樂唯然而已乎聞道場攝心回向隨憘供設為福田王因以其寺名粵宣尼論至道之時乃有斯稱軒轅念天師之教且符今旨淨心所宅豈與同年兼於此伽藍更興靈塔光光流曜比秋月之華蓬蓬茂出如白雲之舉銅槃上竦遠承仙露金鐸相鳴遙驚山鬼又復運藍田之玉採荊山之珍鏤殫變化圖窮相好繢渥不汙用無染之身夜光遍體因現神通之色於是竹間精舍樹下講堂光飾侔青鳥之蓮珍華奪白牛之駕仙靈拖棟或真聖之乘煙雲氣垂甍亂峰巖之觸石是知無生無有鵠林不即不離茲亦鷲嶺道本一準勿輕像法之期佛乃無邊何偏王舍之界寺去州城餘二百里扶桑初曉楊枝始嚼塵消氣滅霧卷霞除升高峰望都邑朱樓紫閣真雲中之化欲來緑樹丹城像域外之飛將至分明可見異隴首之望平川踈散高情踰岱宗之小天下壯哉峻極麗矣莊嚴何但名相佛土頗黎為地法明出世天宮近人齊聖廣淵也如彼菩提道身也如此自可生蓮花於鬲子樊烈火於魔宮屏息而獲法雲翹足而俟授記寧止延皇家卜年之數增我后王佐之功井藤相促城芥將滿庶願力護持群神肅翼須彌腐敗勝地莫渝玄圃飛浮神山恆固今歲在赤奮時惟青秖陽殖官杏日望月桂斫磨瑊玏明揚鼓鍾縱漢帝種桃屢獲花果麻姑看海數移陵陸猶望有類粟山記戊申之歲更同荊峴見望拜之碑無愧之詞乃為銘曰即林嘉遁歸山長住未極人天猶居塵壤我有福地全疑安養閣映珠羅樓懸金網峰高萬刃澗遠千尋煙雲出入仙聖登臨谷幽虛囀松高自吟紫芝咸迾丹桂成彼有人焉創茲虛境高窗蔭柏危櫚承嶺野曠村稀巖空人靜草呼風氣池搖月影默形端拱凝神丘壑搖錫褰衣遨遊林薄思滅毒火求分良藥遠棄形骸蕭然寥曆窮於坎倉精受命陵躪百王懸衡七政洛符效祉河文標聖朝衆水神國多天鏡本枝磐石如圭如璧龍變成章鵬飛舉翮閣延髦士庭多捐客高義盈門清談滿席燕南趙北奇士爰臻盧河通氣白壤飄塵陰陽所合風雨攸均輕軒高蓋來慰斯民卬泥作豉牧羊調馬德通靈物謠成風雅寬猛春秋愛畏冬夏并州陵段冀方踰爰觀六趣尚想三塗香珍薝匐道慕拘盧化城度嶮抨酪求蘇既雕宮觀有類蓬壺百雉攸遠九成迢遰薄霧輕籠微煙少蔽光風新靜暾暉初麗極目相望地乘天際斗回南北日轉西東遑遑馳驟抵速人中地煎熱水天壞災風願將此處懸置虛空大齊天保八年歲在丁丑二月戊辰十五日壬午刊記
